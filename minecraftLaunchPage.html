<style>
        :root {

            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.6), 0 4px 6px -4px rgb(0 0 0 / 0.6);
            --gradient-primary: linear-gradient(135deg, #9d9d9d0a 0%, #9d9d9d0a 100%);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
        }
        header {
            background: var(--gradient-primary);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            transition: all 0.3s;
            cursor: pointer;
        }
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 4rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            margin: 0;
        }
        .announcements {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            box-shadow: var(--shadow-lg);
        }
        .announcements h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0.5rem 0 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .announcements i { color: var(--primary); }
        .announcements hr {
            border: 0;
            height: 1px;
            background-image: url(67.png);
            margin-bottom: 1.5rem;
        }
        .announcements p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.7;
            margin: 0;
        }
        .projects {
        height: 300;
        width: 200;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
        max-width: 1000px;
        margin: 3rem auto;
        padding: 0 1rem;
        }
        .project {
        background: var(--card);
        border-radius: 12px;
        padding: 1.5rem;
        transition: transform 0.3s, box-shadow 0.3s;
        box-shadow: #000000;
        border: #f1f5f9;
        }
        .project:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0);
        }
        .text {
            color: var(--text);
        }
    </style>
</head>
